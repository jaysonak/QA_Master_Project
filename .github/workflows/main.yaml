name: QA Master Project CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

  steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Set up Python
    uses: actions/setup-python@v5
    with:
      python-version: '3.12'

  - name: Install dependencies
    run: |
      python -m pip install --upgrade pip
      pip install pytest selenium playwright flask flask-sqlalchemy requests webdriver-manager
      playwright install --with-deps chromium

  -name: Run Tests
  # I run the app in the background (&) and then run the tests
  # I use 'headless' mode because GitHub's cloud servers don't have a monitor
  run:  |
    python app.py &
    sleep 5
    python -m pytest tests/ -v